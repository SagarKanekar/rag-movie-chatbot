<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movie Chatbot</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b12;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #8b5cf6;
      --accent-2: #7c3aed;
      --danger: #ef4444;
      --user: #2563eb;
      --assistant: #374151;
      --border: #374151;
      --focus: #22d3ee;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 100% -20%, rgba(139, 92, 246, 0.3), transparent 60%),
        radial-gradient(900px 500px at 0% 120%, rgba(37, 99, 235, 0.22), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.9rem;
    }

    .hero {
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.92), rgba(31, 41, 55, 0.9));
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem 1rem 0.85rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.6vw, 1.95rem);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0.3rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .chips {
      margin-top: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip {
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.85);
      color: var(--text);
      border-radius: 999px;
      padding: 0.45rem 0.75rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.15s ease;
    }

    .chip:hover { border-color: var(--accent); }
    .chip:active { transform: scale(0.98); }

    .chat-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.82);
      border-radius: 1rem;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .toolbar {
      padding: 0.7rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      background: rgba(31, 41, 55, 0.65);
    }

    .messages {
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
      max-height: min(58vh, 760px);
    }

    .message {
      max-width: min(84%, 700px);
      border-radius: 0.95rem;
      padding: 0.75rem 0.85rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid transparent;
    }

    .message.user {
      margin-left: auto;
      background: linear-gradient(135deg, var(--user), #1d4ed8);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .message.assistant {
      margin-right: auto;
      background: var(--assistant);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .typing {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
      min-height: 1.2rem;
    }

    .typing span {
      width: 0.4rem;
      height: 0.4rem;
      border-radius: 50%;
      background: #d1d5db;
      animation: bounce 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.12s; }
    .typing span:nth-child(3) { animation-delay: 0.24s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.45; }
      40% { transform: scale(1); opacity: 1; }
    }

    .composer {
      padding: 0.8rem;
      border-top: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.95);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    textarea {
      width: 100%;
      min-height: 76px;
      max-height: 190px;
      resize: vertical;
      border-radius: 0.8rem;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 0.65rem 0.75rem;
      font: inherit;
    }

    .actions {
      margin-top: 0.55rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
    }

    button {
      border: 1px solid transparent;
      border-radius: 0.7rem;
      color: white;
      font: inherit;
      cursor: pointer;
      padding: 0.55rem 0.85rem;
      background: var(--accent);
      transition: background-color 0.2s ease, opacity 0.2s ease;
    }

    button:hover { background: var(--accent-2); }
    button.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }

    button.secondary:hover { background: rgba(31, 41, 55, 0.8); }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    :focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .status {
      margin-top: 0.55rem;
      color: var(--danger);
      font-size: 0.9rem;
      min-height: 1.2rem;
    }

    @media (max-width: 640px) {
      .app { padding: 0.65rem; }
      .message { max-width: 92%; }
      .messages { max-height: 55vh; }
      .actions { align-items: flex-start; flex-direction: column; }
      .hint { order: 2; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>🎬 Movie Chatbot</h1>
      <p class="subtitle">Ask for recommendations, genres, moods, cast picks, and hidden gems.</p>
      <div class="chips" role="list" aria-label="Suggested prompts">
        <button class="chip" type="button" data-prompt="Suggest 5 thriller movies.">Thriller picks</button>
        <button class="chip" type="button" data-prompt="Recommend a feel-good movie for tonight.">Feel-good movie</button>
        <button class="chip" type="button" data-prompt="Give me 5 mind-bending sci-fi movies.">Mind-bending sci-fi</button>
        <button class="chip" type="button" data-prompt="What are some underrated mystery movies?">Underrated mystery</button>
      </div>
    </header>

    <section class="chat-shell" aria-label="Movie chat panel">
      <div class="toolbar">
        <button id="clearChatBtn" class="secondary" type="button">Clear chat</button>
      </div>

      <div id="messages" class="messages" aria-live="polite" aria-atomic="false"></div>

      <form id="chatForm" class="composer">
        <label class="sr-only" for="messageInput">Your message</label>
        <textarea id="messageInput" name="message" placeholder="Ask for recommendations..." autocomplete="off"></textarea>
        <div class="actions">
          <span class="hint">Enter to send • Shift+Enter for newline</span>
          <button id="sendBtn" type="submit">Send</button>
        </div>
        <p id="statusText" class="status" role="status"></p>
      </form>
    </section>
  </main>

  <script>
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearChatBtn = document.getElementById("clearChatBtn");
    const messages = document.getElementById("messages");
    const statusText = document.getElementById("statusText");
    const chips = document.querySelectorAll(".chip");

    const welcomeMessage = "Hi! I'm your movie assistant. Tell me your mood or favorite films and I’ll recommend what to watch next.";
    let isLoading = false;
    let typingBubble = null;

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function addMessage(role, content, isTyping = false) {
      const bubble = document.createElement("article");
      bubble.className = "message " + role;

      if (isTyping) {
        bubble.innerHTML = "<span class='typing' aria-label='Assistant is typing'><span></span><span></span><span></span></span>";
      } else {
        bubble.textContent = content;
      }

      messages.appendChild(bubble);
      scrollToBottom();
      return bubble;
    }

    function resetChat() {
      messages.innerHTML = "";
      statusText.textContent = "";
      typingBubble = null;
      addMessage("assistant", welcomeMessage);
    }

    function setLoading(loading) {
      isLoading = loading;
      sendBtn.disabled = loading;
      messageInput.disabled = loading;
      clearChatBtn.disabled = loading;
    }

    async function sendMessage(rawMessage) {
      const message = (rawMessage || "").trim();
      statusText.textContent = "";
      if (!message || isLoading) return;

      addMessage("user", message);
      setLoading(true);
      typingBubble = addMessage("assistant", "", true);

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        let data = {};
        try {
          data = await response.json();
        } catch (_) {
          throw new Error("Unexpected server response.");
        }

        if (!response.ok || !data.reply) {
          throw new Error(data.detail || "Unable to get a response right now.");
        }

        if (typingBubble) typingBubble.remove();
        typingBubble = null;
        addMessage("assistant", data.reply);
      } catch (error) {
        if (typingBubble) typingBubble.remove();
        typingBubble = null;
        statusText.textContent = "Sorry, we couldn't reach the chat service. Please try again.";
        addMessage("assistant", "I hit an issue connecting to the server. Please try again in a moment.");
      } finally {
        setLoading(false);
        messageInput.focus();
      }
    }

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const draft = messageInput.value;
      const trimmed = draft.trim();
      if (!trimmed) return;
      messageInput.value = "";
      sendMessage(trimmed);
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        if (isLoading) return;
        const prompt = chip.dataset.prompt || "";
        messageInput.value = "";
        sendMessage(prompt);
      });
    });

    clearChatBtn.addEventListener("click", () => {
      if (isLoading) return;
      resetChat();
      messageInput.focus();
    });

    resetChat();
  </script>
</body>
</html>
